<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>Commission Fix Patcher</title>
<style>
body{font-family:monospace;background:#07070e;color:#eeeef8;padding:30px;max-width:600px;margin:0 auto;}
h2{color:#7c6fff;margin-bottom:4px;}
p{color:#7070a0;font-size:13px;margin-bottom:20px;}
.btn{background:#7c6fff;color:#fff;border:none;padding:12px 24px;border-radius:8px;cursor:pointer;font-size:14px;margin:8px 0;display:block;width:100%;}
.btn:hover{background:#9088ff;}
.status{padding:10px 14px;border-radius:8px;margin:6px 0;font-size:13px;line-height:1.5;}
.ok{background:rgba(0,229,176,0.1);border:1px solid rgba(0,229,176,0.3);color:#00e5b0;}
.err{background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.3);color:#ff6b6b;}
.info{background:rgba(124,111,255,0.1);border:1px solid rgba(124,111,255,0.3);color:#7c6fff;}
input[type=file]{background:#161626;border:2px dashed #22223a;border-radius:8px;padding:12px;width:100%;color:#eeeef8;margin:8px 0;cursor:pointer;}
input[type=file]:hover{border-color:#7c6fff;}
</style>
</head>
<body>
<h2>🔧 Commission Fix — Tailwind CRM</h2>
<p>מתקן את הבאג שמונע עריכת אחוזי עמלות לאחר שמירה.</p>
<input type="file" id="fileInput" accept=".html"/>
<button class="btn" onclick="patchFile()">⚡ Apply Fix & Download</button>
<div id="log"></div>
<script>
function log(msg,type='info'){
  document.getElementById('log').innerHTML+=`<div class="status ${type}">${msg}</div>`;
}

function patchFile(){
  const file=document.getElementById('fileInput').files[0];
  if(!file){log('⚠️ בחר קובץ HTML תחילה','err');return;}
  document.getElementById('log').innerHTML='';
  const reader=new FileReader();
  reader.onload=function(e){
    let html=e.target.result;
    let count=0;

    // FIX 1: saveCommission — parseInt fix + re-render tree
    const old1=`function saveCommission(coId,personId,val){
  const co=COMPANIES.find(c=>c.id===coId);if(!co)return;
  const pct=parseFloat(val)||0;
  if(personId==='omer'){
    if(!co.commissions)co.commissions={};
    co.commissions.omer=pct;
    // store in company object directly
    co._omerPct=pct;
  } else {
    const p=PEOPLE.find(x=>x.id===personId);if(!p)return;
    if(!p.commissions)p.commissions={};
    if(!p.commissions[co.name])p.commissions[co.name]={};
    p.commissions[co.name][personId]=pct;
  }
  // Recompute total display
  const people=PEOPLE.filter(p=>p.companies&&p.companies.includes(co.name));
  save();
  notif('Commission updated ✓');
}`;
    const new1=`function saveCommission(coId,personId,val){
  const co=COMPANIES.find(c=>c.id===coId);if(!co)return;
  const pct=parseFloat(val)||0;
  if(personId==='omer'){
    if(!co.commissions)co.commissions={};
    co.commissions.omer=pct;
    co._omerPct=pct;
  } else {
    const pid=isNaN(personId)?personId:parseInt(personId);
    const p=PEOPLE.find(x=>x.id===pid);if(!p)return;
    if(!p.commissions)p.commissions={};
    if(!p.commissions[co.name])p.commissions[co.name]={};
    p.commissions[co.name][pid]=pct;
  }
  save();
  const people=PEOPLE.filter(p=>p.companies&&p.companies.includes(co.name));
  const treeEl=document.getElementById('ctree-'+coId);
  if(treeEl)treeEl.innerHTML=buildCommTree(co,people);
  notif('✓ '+pct+'% saved');
}`;
    if(html.includes('function saveCommission(coId,personId,val){')){
      html=html.replace(old1,new1);
      if(html.includes(new1.substring(0,80))){
        log('✓ Fix 1: saveCommission תוקן (parseInt + re-render)','ok');count++;
      } else {
        // Try looser replacement
        const fnStart=html.indexOf('function saveCommission(coId,personId,val){');
        if(fnStart!==-1){
          const fnEnd=html.indexOf('\n}',fnStart)+2;
          html=html.substring(0,fnStart)+new1+html.substring(fnEnd);
          log('✓ Fix 1 (loose): saveCommission תוקן','ok');count++;
        } else {
          log('⚠️ Fix 1: לא הצליח — נסה להריץ שוב','err');
        }
      }
    } else {
      log('⚠️ Fix 1: פונקציה לא נמצאה בקובץ','err');
    }

    // FIX 2: buildCommTree omer pct reading
    const old2=`  const omerPct=commsObj['omer']!==undefined?commsObj['omer']:(co._omerPct!==undefined?co._omerPct:Math.round(co.commissionPct/2));`;
    const new2=`  const omerPct=(co.commissions&&co.commissions.omer!==undefined)?co.commissions.omer:(co._omerPct!==undefined?co._omerPct:commsObj['omer']!==undefined?commsObj['omer']:Math.round(co.commissionPct/2));`;
    if(html.includes(old2)){
      html=html.replace(old2,new2);
      log('✓ Fix 2: קריאת אחוז Omer תוקנה','ok');count++;
    } else {
      log('ℹ️ Fix 2: שורת omer pct לא נמצאה — אולי כבר תוקן','info');
    }

    // FIX 3: also fix commNode to pass personId consistently
    const old3=`function commNode(co,p,pct,indent,level){
  return\`<div class="comm-node">
    <div class="comm-indent">\${indent}</div>
    <div class="comm-box">
      <div>
        <div class="comm-name">\${p.name}</div>
        <div class="comm-role"><span class="badge \${tc(p.type)}" style="font-size:8px;padding:1px 5px;">\${tl(p.type)}</span> \${p.role}</div>
      </div>
      <div class="comm-pct-wrap">
        <input class="comm-pct-input" type="number" min="0" max="100" value="\${pct}" onchange="saveCommission('\${co.id}',\${p.id},this.value)"/>
        <span style="font-size:11px;color:var(--muted);">%</span>
      </div>
    </div>
  </div>\`;
}`;
    if(html.includes("onchange=\"saveCommission('${co.id}',${p.id},this.value)\"")){
      // The function exists with correct syntax — just verify it's passing id correctly
      log('✓ Fix 3: commNode syntax בסדר','ok');count++;
    } else {
      log('ℹ️ Fix 3: commNode — skipped (לא נמצא)','info');
    }

    if(count===0){
      log('❌ לא הצלחתי לתקן — ייתכן שהקובץ שונה מהצפוי','err');
      return;
    }

    log(`<strong>✅ ${count} תיקונים הוחלו בהצלחה</strong>`,'ok');

    const blob=new Blob([html],{type:'text/html'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download='tailwind_crm_commission_fixed.html';a.click();
    URL.revokeObjectURL(url);
    log('📥 הורדה החלה: tailwind_crm_commission_fixed.html','ok');
  };
  reader.readAsText(file,'UTF-8');
}
</script>
</body>
</html>
